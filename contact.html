<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blade Slinger Contact Page</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .bg-bladeGreen { background-color: #00A651; }
  </style>
</head>

<body class="bg-bladeGreen text-white">

  <!-- WHITE BANNER HEADER -->
  <header class="w-full bg-white py-4 shadow-md">
    <div class="container mx-auto text-center">
      <img src="images/logo.png" alt="Blade Slinger Logo" class="h-24 mx-auto">

      <nav class="mt-4 space-x-6 text-lg font-semibold text-black">
        <a href="index.html" class="hover:underline">Home</a>
        <a href="products.html" class="hover:underline">Products</a>
        <a href="about.html" class="hover:underline">About</a>
        <a href="contact.html" class="hover:underline">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container mx-auto p-6">

    <form class="bg-white text-black p-6 rounded-lg border-4 border-black mb-10">
      <h2 class="text-2xl font-bold mb-4">Schedule An Appointment</h2>

      <div class="grid gap-4">
        <input class="p-3 border border-gray-400 rounded" placeholder="Name">
        <input class="p-3 border border-gray-400 rounded" placeholder="Property Address">
        <input class="p-3 border border-gray-400 rounded" placeholder="Phone Number">
        <input class="p-3 border border-gray-400 rounded" placeholder="Email">

        <select class="p-3 border border-gray-400 rounded">
          <option>Lawn Maintenance</option>
          <option>Landscaping Services</option>
          <option>Landscape Drainage Solutions</option>
          <option>Gardening Services</option>
          <option>Debris Removal & Disposal</option>
          <option>Merchandise Bulk Discounts</option>
        </select>

        <button class="bg-black text-white px-6 py-3 rounded font-bold hover:bg-gray-800">
          Submit
        </button>
      </div>
    </form>

    <form class="bg-white text-black p-6 rounded-lg border-4 border-black">
      <h2 class="text-2xl font-bold mb-4">Contact Request</h2>

      <div class="grid gap-4">
        <input class="p-3 border border-gray-400 rounded" placeholder="Name">
        <input class="p-3 border border-gray-400 rounded" placeholder="Phone Number">
        <input class="p-3 border border-gray-400 rounded" placeholder="Email">

        <select class="p-3 border border-gray-400 rounded">
          <option>General Questions</option>
          <option>Customer Complaints</option>
          <option>Order Issues</option>
          <option>Return Policy</option>
        </select>

        <textarea class="p-3 border border-gray-400 rounded" rows="4" placeholder="Message"></textarea>

        <button class="bg-black text-white px-6 py-3 rounded font-bold hover:bg-gray-800">
          Submit
        </button>
      </div>
    </form>

  </main>

  <footer class="text-center py-4 bg-black text-white mt-10">
    © Blade Slinger LLC.
  </footer>

</body>
</html>
