<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blade Slinger Contact Page</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>

<body class="text-dark" style="background-color: #F5F5F5;">


  <header class="bg-white text-dark p-3 border-bottom">
    <div class="container">
      <!-- Logo -->
      <img src="images/logo.png" alt="Blade Slinger Logo" style="height: 80px;">
      <!-- Logo Title -->
      <h1 class="mt-2 fw-bold text-primary">Contact Us</h1>
      <nav class="mt-2">
        <a href="index.html" class="text-primary me-3 text-decoration-none">Home</a>
        <a href="products.html" class="text-primary me-3 text-decoration-none">Products</a>
        <a href="about.html" class="text-primary me-3 text-decoration-none">About</a>
        <a href="contact.html" class="text-primary text-decoration-none">Contact</a>
      </nav>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main>
    <form class="container p-5">
      <h2 class="mb-4">Schedule An Appointment</h2>

      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" placeholder="Personal or Business Name">
      </div>

      <div class="mb-3">
        <label class="form-label">Property Address</label>
        <input type="text" class="form-control" placeholder="Residential or Commercial Address">
      </div>

      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" placeholder="Personal or Business Phone">
      </div>

      <div class="mb-3">
        <label class="form-label">Personal or Business Email</label>
        <input type="email" class="form-control" placeholder="you@example.com">
      </div>

      <div class="mb-3">
        <label class="form-label">Request Service</label>
        <select class="form-select">
          <option>Lawn Maintenance</option>
          <option>Landscaping Services</option>
          <option>Landscape Drainage Solutions</option>
          <option>Gardening Services</option>
          <option>Debris Removal &amp; Disposal</option>
          <option>Merchandise Bulk Discounts</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary">Submit</button>
    </form>

    <form class="container p-5">
      <h2 class="mb-4">Contact Request</h2>

      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" placeholder="Your Name">
      </div>

      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" placeholder="Phone #">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="you@example.com">
      </div>

      <div class="mb-3">
        <label class="form-label">Service Type</label>
        <select class="form-select">
          <option>General Questions</option>
          <option>Customer Complaints</option>
          <option>Order Issues</option>
          <option>Return Policy</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Message</label>
        <textarea class="form-control" rows="4" placeholder="Write your message here"></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </main>

  <footer class="bg-primary text-white text-center p-3">
    <p class="mb-0">© Blade Slinger LLC.</p>
  </footer>

</body>
</html>
